name: iCareOS CI/CD Pipeline

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  cloudrun-build:
    name: Phase 1 - Build Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}

  # Note: Selenium UI testing (Phase 2), Trivy (Phase 3), and Docker Push (Phase 4)
  # are stubbed out below and require additional explicit configuration/scripts to run fully.

  selenium-tests:
    name: Phase 2 - UI Testing
    needs: cloudrun-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # E.g., setup Python and run Selenium if using python-selenium
      # - name: Run Selenium Tests
      #   run: |
      #     pip install pytest selenium
      #     pytest selenium_tests/
      - name: Placeholder UI Test Step
        run: echo "Selenium tests passed (Stub)"

  docker-build:
    name: Phase 3a - Build Temp Docker Image
    needs: selenium-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t icareos-temp .
        
      - name: Export Temp Image for Trivy
        run: docker save icareos-temp -o icareos-temp.tar

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: icareos-temp.tar

  trivy-scan:
    name: Phase 3b - Container Security Scanning
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          
      - name: Load Temp Image
        run: docker load -i icareos-temp.tar

      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'icareos-temp'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  push-image:
    name: Phase 4 - Docker Build & Push
    needs: trivy-scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          
      - name: Load Temp Image
        run: docker load -i icareos-temp.tar

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Tag and Push Image
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          docker tag icareos-temp ichancetek/icareos-platform:latest
          docker tag icareos-temp ichancetek/icareos-platform:v-ci-$COMMIT_HASH
          docker push ichancetek/icareos-platform:latest
          docker push ichancetek/icareos-platform:v-ci-$COMMIT_HASH
